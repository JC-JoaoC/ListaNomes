<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Lista de Nomes</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700;900&family=Lato:wght@300;400;700&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0d0d0d;
      --surface: #161616;
      --card: #1e1e1e;
      --border: #2a2a2a;
      --gold: #c9a84c;
      --gold-light: #e8c96a;
      --text: #e8e8e8;
      --muted: #888;
      --highlight: #c9a84c22;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Lato', sans-serif;
      min-height: 100vh;
      overflow-x: hidden;
    }

    /* Background texture */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background:
        radial-gradient(ellipse 80% 60% at 20% 10%, #c9a84c0a 0%, transparent 60%),
        radial-gradient(ellipse 60% 40% at 80% 90%, #c9a84c07 0%, transparent 50%);
      pointer-events: none;
      z-index: 0;
    }

    .wrapper {
      max-width: 820px;
      margin: 0 auto;
      padding: 60px 24px 80px;
      position: relative;
      z-index: 1;
    }

    /* Header */
    header {
      text-align: center;
      margin-bottom: 52px;
      animation: fadeDown 0.7s ease both;
    }

    .eyebrow {
      font-family: 'Lato', sans-serif;
      font-weight: 300;
      font-size: 11px;
      letter-spacing: 5px;
      text-transform: uppercase;
      color: var(--gold);
      margin-bottom: 14px;
    }

    h1 {
      font-family: 'Playfair Display', serif;
      font-size: clamp(36px, 7vw, 68px);
      font-weight: 900;
      line-height: 1.0;
      color: var(--text);
    }

    h1 span {
      color: var(--gold);
    }

    .divider {
      width: 60px;
      height: 2px;
      background: linear-gradient(90deg, transparent, var(--gold), transparent);
      margin: 22px auto 0;
    }

    /* Search */
    .search-wrap {
      position: relative;
      margin-bottom: 44px;
      animation: fadeDown 0.7s 0.15s ease both;
    }

    .search-wrap svg {
      position: absolute;
      left: 18px;
      top: 50%;
      transform: translateY(-50%);
      color: var(--gold);
      pointer-events: none;
    }

    #search {
      width: 100%;
      padding: 16px 20px 16px 52px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 4px;
      color: var(--text);
      font-family: 'Lato', sans-serif;
      font-size: 16px;
      font-weight: 300;
      letter-spacing: 0.5px;
      outline: none;
      transition: border-color 0.25s, box-shadow 0.25s;
    }

    #search::placeholder { color: var(--muted); }

    #search:focus {
      border-color: var(--gold);
      box-shadow: 0 0 0 3px #c9a84c15;
    }

    /* Counter */
    #counter {
      text-align: right;
      font-size: 12px;
      color: var(--muted);
      margin-top: 10px;
      letter-spacing: 1px;
    }

    #counter strong { color: var(--gold); }

    /* No results */
    #no-results {
      display: none;
      text-align: center;
      padding: 60px 20px;
      color: var(--muted);
      font-size: 15px;
      letter-spacing: 0.5px;
    }

    #no-results .emoji { font-size: 40px; display: block; margin-bottom: 14px; }

    /* Letter sections */
    .letter-section {
      margin-bottom: 36px;
      animation: fadeUp 0.5s ease both;
    }

    .letter-header {
      display: flex;
      align-items: center;
      gap: 16px;
      margin-bottom: 14px;
    }

    .letter-badge {
      width: 42px;
      height: 42px;
      border: 1.5px solid var(--gold);
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Playfair Display', serif;
      font-size: 20px;
      font-weight: 700;
      color: var(--gold);
      flex-shrink: 0;
      position: relative;
    }

    .letter-badge::before {
      content: '';
      position: absolute;
      inset: 3px;
      background: var(--gold);
      opacity: 0.08;
    }

    .letter-line {
      flex: 1;
      height: 1px;
      background: linear-gradient(90deg, var(--border), transparent);
    }

    .letter-count {
      font-size: 11px;
      color: var(--muted);
      letter-spacing: 2px;
    }

    /* Name list */
    .names-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 6px;
    }

    @media (max-width: 520px) {
      .names-grid { grid-template-columns: 1fr; }
    }

    .name-item {
      padding: 11px 16px;
      background: var(--card);
      border: 1px solid var(--border);
      border-left: 3px solid transparent;
      border-radius: 3px;
      font-size: 14px;
      font-weight: 300;
      color: var(--text);
      letter-spacing: 0.3px;
      transition: all 0.2s ease;
      cursor: default;
    }

    .name-item:hover {
      border-left-color: var(--gold);
      background: var(--highlight);
      color: var(--gold-light);
      transform: translateX(3px);
    }

    /* Search highlight */
    .name-item mark {
      background: var(--gold);
      color: #0d0d0d;
      border-radius: 2px;
      padding: 0 2px;
      font-weight: 700;
    }

    /* Hidden */
    .name-item.hidden { display: none; }
    .letter-section.hidden { display: none; }

    /* Animations */
    @keyframes fadeDown {
      from { opacity: 0; transform: translateY(-18px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(14px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* Scrollbar */
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: var(--bg); }
    ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
    ::-webkit-scrollbar-thumb:hover { background: var(--gold); }
  </style>
</head>
<body>
<div class="wrapper">

  <header>
    <p class="eyebrow">Relação Oficial</p>
    <h1>Lista de <span>Nomes</span></h1>
    <div class="divider"></div>
  </header>

  <div class="search-wrap">
    <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" fill="none" stroke="currentColor"
         stroke-width="2" stroke-linecap="round" stroke-linejoin="round" viewBox="0 0 24 24">
      <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
    </svg>
    <input type="search" id="search" placeholder="Digite seu nome para encontrá-lo..." autocomplete="off" spellcheck="false"/>
    <div id="counter"></div>
  </div>

  <div id="no-results">
    <span class="emoji">🔍</span>
    Nenhum nome encontrado para "<strong id="search-term"></strong>"
  </div>

  <div id="list"></div>

</div>

<script>
  const names = [
    "Aline Bueno Do Prado",
    "Alice Rocha do Nascimento da Silva",
    "Ana Paula Peratelli Dos Reis",
    "André de Carvalho Barbosa",
    "Andréia Carla Alves da Silva",
    "Andresa De Assis Pereira",
    "Ariane Brandão de Souza",
    "Beatriz Dos Santos Ruiz Prust",
    "Camila Cubas de Sousa",
    "Carla Lima Brito",
    "Caroline conceição da silva",
    "Daiane Cristina Da Silva Francisco",
    "Daniele dos Santos Silva Barbosa",
    "Déborah Barbosa Da silva Lima",
    "Diego Lamana",
    "Diogo Vitorino da silva",
    "Eduarda Cubas De Sousa",
    "Eliabe Álvaro Soares Dos reis",
    "Erica Aparecida Rodrigues Da Silva",
    "Erika Cristina Patrício",
    "Erik Vinícius Miranda Sousa",
    "Fernanda Alves dos Santos",
    "Francisco Lucas Gonçalves de Anchieta",
    "Geovana Lima Ferrari",
    "Glenno Victor Marques Pinto",
    "Grazielly Souza Santos",
    "Guilherme Dos Santos Alves",
    "Guilherme Henrique Ferreira Silvano",
    "Gustavo Henrique de Jesus Nascimento",
    "Hellen Cristina Guerino da Silva",
    "Hosana Silva da Rocha Porto",
    "Iara Pereira Nascimento",
    "Ingrid Raiane Demazo Novais",
    "Isabela Antônia Gomes da Silva",
    "Jefferson Ferreira Lima",
    "Jessica Lourenço Brandão",
    "Jociane Pereira Gomes",
    "Júlia Vitória dos Santos Andrade",
    "Juliana Aparecida dos Santos",
    "Kaelayne Do Nascimento Silva",
    "Karoline de Lima Silva",
    "Kelly Ingrid Silva Oliveira",
    "Kevelyn Paiva Da Silva",
    "Larissa Dias Franco dos Santos",
    "Letícia Eliana Da Silva Barbosa",
    "Letícia Pimentel Vitor",
    "Letícia Santos Cupertino",
    "Lequisonia Pinheiro Chaves Silva",
    "Livia Fernandes De Lima",
    "Luana Moreira Porto",
    "Luciana Bezerra de Lima",
    "Luzia Genecilda Do Nascimento Soares",
    "Márcio Ferreira",
    "Maria Daniela Alves De Lima",
    "Mariane Carvalho Gonçalves",
    "Marenilce Seguins Martins",
    "Matheus dos Santos Gomes",
    "Matheus Souza Marcos",
    "Matheus Vitor Oliva",
    "Mayara Santiago De Araújo Da Silva",
    "Rayssa Maiara de Souza",
    "Rebeca Vitoria Dantas de Mendonça",
    "Renata de Almeida",
    "Rita de Cássia Martins",
    "Ruan Conrado Rodrigues",
    "Stefanie Barreiros Martins",
    "Tais Rozeno De Sousa",
    "Talia Honória da Silva",
    "Thaina Pereira De Jesus",
    "Vitor Breno Santana Correia",
    "Yasmin Araújo de Oliveira"
  ];

  // Normalize accents for comparison
  function normalize(str) {
    return str.normalize('NFD').replace(/[\u0300-\u036f]/g, '').toLowerCase();
  }

  function getFirstLetter(name) {
    return name.trim()[0].normalize('NFD').replace(/[\u0300-\u036f]/g, '').toUpperCase();
  }

  // Group by first letter
  function groupByLetter(arr) {
    const groups = {};
    arr.forEach(name => {
      const letter = getFirstLetter(name);
      if (!groups[letter]) groups[letter] = [];
      groups[letter].push(name);
    });
    return groups;
  }

  const grouped = groupByLetter(names);
  const letters = Object.keys(grouped).sort();

  const listEl = document.getElementById('list');
  const searchEl = document.getElementById('search');
  const counterEl = document.getElementById('counter');
  const noResults = document.getElementById('no-results');
  const searchTermEl = document.getElementById('search-term');

  // Build DOM
  letters.forEach((letter, i) => {
    const section = document.createElement('div');
    section.className = 'letter-section';
    section.dataset.letter = letter;
    section.style.animationDelay = `${0.05 * i}s`;

    section.innerHTML = `
      <div class="letter-header">
        <div class="letter-badge">${letter}</div>
        <div class="letter-line"></div>
        <span class="letter-count" data-letter="${letter}">${grouped[letter].length} nome${grouped[letter].length > 1 ? 's' : ''}</span>
      </div>
      <div class="names-grid" data-grid="${letter}"></div>
    `;

    const grid = section.querySelector('.names-grid');

    grouped[letter].forEach(name => {
      const item = document.createElement('div');
      item.className = 'name-item';
      item.dataset.name = name;
      item.dataset.normalized = normalize(name);
      item.textContent = name;
      grid.appendChild(item);
    });

    listEl.appendChild(section);
  });

  updateCounter(names.length, names.length);

  function updateCounter(visible, total) {
    counterEl.innerHTML = `Exibindo <strong>${visible}</strong> de <strong>${total}</strong> nomes`;
  }

  function highlight(text, query) {
    if (!query) return text;
    const normText = normalize(text);
    const normQuery = normalize(query);
    const idx = normText.indexOf(normQuery);
    if (idx === -1) return text;
    return (
      text.slice(0, idx) +
      `<mark>${text.slice(idx, idx + query.length)}</mark>` +
      text.slice(idx + query.length)
    );
  }

  searchEl.addEventListener('input', () => {
    const raw = searchEl.value.trim();
    const query = normalize(raw);

    let totalVisible = 0;

    document.querySelectorAll('.letter-section').forEach(section => {
      const letter = section.dataset.letter;
      let sectionVisible = 0;

      section.querySelectorAll('.name-item').forEach(item => {
        const matches = !query || item.dataset.normalized.includes(query);
        if (matches) {
          item.classList.remove('hidden');
          item.innerHTML = highlight(item.dataset.name, raw);
          sectionVisible++;
          totalVisible++;
        } else {
          item.classList.add('hidden');
          item.textContent = item.dataset.name;
        }
      });

      const countEl = section.querySelector(`[data-letter="${letter}"]`);
      if (sectionVisible === 0) {
        section.classList.add('hidden');
      } else {
        section.classList.remove('hidden');
        countEl.textContent = `${sectionVisible} nome${sectionVisible > 1 ? 's' : ''}`;
      }
    });

    updateCounter(totalVisible, names.length);

    if (totalVisible === 0 && raw) {
      noResults.style.display = 'block';
      searchTermEl.textContent = raw;
    } else {
      noResults.style.display = 'none';
    }
  });
</script>
</body>
</html>
